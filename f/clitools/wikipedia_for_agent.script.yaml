summary: Wikipedia CLI wrapper for agents
description: Call the hosted wikipedia-pp-cli through the shared CLI server.
lock: '!inline f/clitools/wikipedia_for_agent.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    compact:
      type: boolean
      description: ''
      default: false
    dataSource:
      type: string
      description: ''
      default: auto
      enum:
        - auto
        - live
        - local
      originalType: enum
    day:
      type: number
      description: ''
      default: null
    dryRun:
      type: boolean
      description: ''
      default: false
    feedType:
      type: string
      description: ''
      default: events
      enum:
        - events
        - births
        - deaths
        - holidays
      originalType: enum
    month:
      type: number
      description: ''
      default: null
    operation:
      type: string
      description: ''
      default: page_get_summary
      enum:
        - page_get_random
        - page_get_summary
        - page_get_html
        - page_get_media
        - feed_get_on_this_day
        - custom
      originalType: enum
    rawArgs:
      type: array
      description: ''
      default: null
      items:
        type: string
      originalType: string[]
    select:
      type: string
      description: ''
      default: null
      originalType: string
    timeoutSeconds:
      type: integer
      description: ''
      default: 30
    title:
      type: string
      description: ''
      default: null
      originalType: string
  required: []
